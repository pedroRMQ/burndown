name: Generate Burndown Chart

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Clonar ferramenta
        run: |
          git clone https://github.com/thehale/github-projects-burndown-chart.git ferramenta

      # 🔍 DEBUG REAL — VER O QUE EXISTE
      - name: Inspecionar ferramenta
        run: |
          echo "Arquivos dentro da ferramenta:"
          ls -R ferramenta

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install -r ferramenta/requirements.txt

      # ✅ EXECUÇÃO CORRETA (SEM ADIVINHAR NOME)
      - name: Executar script correto
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd ferramenta

          echo "Procurando script principal..."
          SCRIPT=$(find . -maxdepth 1 -name "*.py" | head -n 1)

          if [ -z "$SCRIPT" ]; then
            echo "Erro: nenhum script Python encontrado"
            exit 1
          fi

          echo "Executando: $SCRIPT"
          python "$SCRIPT" --config ../config.json

      # 🔍 VER SE GEROU IMAGEM
      - name: Procurar imagem
        run: |
          echo "Arquivos PNG encontrados:"
          find . -name "*.png"

      - name: Copiar gráfico
        run: |
          FILE=$(find . -name "*.png" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Erro: nenhum gráfico foi gerado"
            exit 1
          fi

          echo "Imagem encontrada: $FILE"
          cp "$FILE" burndown.png

      - name: Commitar
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add burndown.png

          git commit -m "Atualiza burndown" || echo "Sem mudanças"

          git push

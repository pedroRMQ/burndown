name: Generate Burndown Chart

on:
  schedule:
    - cron: "0 0 * * *" # roda todo dia (meia-noite UTC)
  workflow_dispatch: # permite rodar manualmente

permissions:
  contents: write
  projects: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório principal
        uses: actions/checkout@v4

      - name: Clonar ferramenta de burndown
        run: |
          git clone https://github.com/thehale/github-projects-burndown-chart.git ferramenta

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install -r ferramenta/requirements.txt

      - name: Gerar gráfico
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ferramenta
          python main.py --config ../config.json

      # 🔍 DEBUG (IMPORTANTE)
      - name: Verificar arquivos gerados
        run: |
          echo "Estrutura de arquivos:"
          ls -R

      # ✅ CORREÇÃO PRINCIPAL AQUI
      - name: Copiar gráfico
        run: |
          # tenta encontrar qualquer PNG gerado
          FILE=$(find ferramenta -name "*.png" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Nenhuma imagem encontrada!"
            exit 1
          fi

          echo "Imagem encontrada em: $FILE"
          cp "$FILE" burndown.png

      - name: Commit e push do gráfico
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add burndown.png

          git commit -m "Atualiza gráfico de Burndown" || echo "Sem mudanças"

          git push

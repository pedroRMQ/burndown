name: Generate Burndown Chart

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Clonar ferramenta
        run: |
          git clone https://github.com/thehale/github-projects-burndown-chart.git ferramenta

      - name: Verificar clone
        run: |
          echo "Conteúdo da raiz:"
          ls -la

          echo "Conteúdo da ferramenta:"
          ls -la ferramenta

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar ferramenta (modo CLI)
        run: |
          pip install ./ferramenta

      - name: Gerar gráfico (forma correta)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          github-projects-burndown-chart --config config.json

      - name: Procurar imagem gerada
        run: |
          echo "Buscando PNG..."
          find . -name "*.png"

      - name: Copiar gráfico
        run: |
          FILE=$(find . -name "*.png" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Erro: nenhum gráfico foi gerado"
            exit 1
          fi

          echo "Imagem encontrada: $FILE"
          cp "$FILE" burndown.png

      - name: Commitar e enviar
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add burndown.png

          git commit -m "Atualiza burndown" || echo "Sem mudanças"

          git push

name: Generate Burndown Chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  burndown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests matplotlib numpy

      - name: Gerar gráfico de burndown
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python burndown_generator.py \
            --token   "$GH_TOKEN" \
            --login   "pedroRMQ" \
            --project 8 \
            --start   "2026-04-28" \
            --end     "2026-05-12" \
            --points-label "size " \
            --output  burndown.png

      - name: Commitar e publicar gráfico
        run: |
          git config --global user.name  "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git fetch origin main
          git reset --hard origin/main
          git add burndown.png
          git commit -m "chore: atualiza burndown chart [skip ci]" || echo "Sem mudanças"
          git push

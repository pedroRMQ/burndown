name: Gerar Burndown Chart Diário

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-grafico:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixar o seu Repositório
        uses: actions/checkout@v4
        with:
          path: 'meu-codigo'
      
      - name: 2. Baixar a ferramenta thehale
        uses: actions/checkout@v4
        with:
          repository: 'thehale/github-projects-burndown-chart'
          path: 'ferramenta'

      - name: 3. Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Instalar dependências da ferramenta
        run: |
          cd ferramenta
          pip install -r requirements.txt

      - name: 5. Aplicar suas configurações
        run: |
          cp meu-codigo/burndown-config.json ferramenta/src/github_projects_burndown_chart/config/config.json
          echo '{"github_token": "${{ secrets.BURNDOWN_PAT }}"}' > ferramenta/src/github_projects_burndown_chart/config/secrets.json

      - name: 6. Executar a ferramenta
        run: |
          cd ferramenta
          export PYTHONPATH=$PYTHONPATH:.
          python src/github_projects_burndown_chart/main.py repository pedroRMQ/burndown
          
      - name: 7. Salvar e enviar o Gráfico para o repositório
      run: |
        # Entra na pasta onde o gráfico foi gerado
        cd ferramenta
        
        # Procura por qualquer arquivo PNG gerado (o script costuma salvar na raiz de onde rodou)
        # E move para a raiz do seu repositório principal com o nome burndown.png
        ls -la # Isso vai listar os arquivos no log para a gente ter certeza
        mv *.png ../burndown.png || echo "Aviso: Imagem não encontrada para mover"
        
        cd ..
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add burndown.png
        git commit -m "📊 Atualiza o gráfico de Burndown" || echo "Sem mudanças para salvar"
        git push

name: Generate Burndown Chart

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Clonar ferramenta
        run: |
          git clone https://github.com/thehale/github-projects-burndown-chart.git ferramenta

      # 🔍 DEBUG TOTAL (isso resolve 90% dos problemas)
      - name: Ver estrutura da ferramenta
        run: |
          echo "==== RAIZ ===="
          ls -la
          echo "==== FERRAMENTA ===="
          ls -R ferramenta

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install -r ferramenta/requirements.txt

      # ✅ EXECUÇÃO DIRETA (sem adivinhação)
      - name: Gerar gráfico
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd ferramenta

          echo "Tentando rodar script padrão..."

          if [ -f "src/burndown.py" ]; then
            python src/burndown.py --config ../config.json
          elif [ -f "burndown.py" ]; then
            python burndown.py --config ../config.json
          else
            echo "ERRO: não achei burndown.py"
            echo "Arquivos disponíveis:"
            find . -name "*.py"
            exit 1
          fi

      - name: Procurar imagem
        run: |
          echo "Buscando PNG..."
          find . -name "*.png"

      - name: Copiar gráfico
        run: |
          FILE=$(find . -name "*.png" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Erro: nenhum gráfico foi gerado"
            exit 1
          fi

          echo "Imagem encontrada: $FILE"
          cp "$FILE" burndown.png

      - name: Commitar
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add burndown.png
          git commit -m "Atualiza burndown" || echo "Sem mudanças"
          git push

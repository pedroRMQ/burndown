name: Generate Burndown Chart

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar seu repositório
        uses: actions/checkout@v4

      - name: Clonar ferramenta de burndown
        run: |
          git clone https://github.com/thehale/github-projects-burndown-chart.git ferramenta

      # 🔍 DEBUG — ver se a pasta foi criada
      - name: Verificar pasta ferramenta
        run: |
          ls -la
          ls -la ferramenta

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install -r ferramenta/requirements.txt

      - name: Gerar gráfico
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd ferramenta
          python burndown.py --config ../config.json

      # 🔍 DEBUG — ver onde o PNG foi gerado
      - name: Procurar imagem
        run: |
          find . -name "*.png"

      - name: Copiar imagem
        run: |
          FILE=$(find . -name "*.png" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Nenhuma imagem encontrada"
            exit 1
          fi

          echo "Imagem encontrada: $FILE"
          cp "$FILE" burndown.png

      - name: Commitar imagem
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add burndown.png

          git commit -m "Atualiza burndown" || echo "Sem mudanças"

          git push

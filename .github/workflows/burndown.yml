name: Generate Burndown Chart

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Clonar ferramenta
        run: |
          git clone https://github.com/thehale/github-projects-burndown-chart.git ferramenta

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install -r ferramenta/requirements.txt

      - name: Gerar gráfico
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd ferramenta
          python main.py --config ../config.json

      # DEBUG — MUITO IMPORTANTE
      - name: Ver arquivos gerados
        run: |
          ls -R

      - name: Copiar gráfico gerado
        run: |
          FILE=$(find ferramenta -name "*.png" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Erro: Nenhuma imagem foi gerada"
            exit 1
          fi

          echo "Imagem encontrada: $FILE"
          cp "$FILE" burndown.png

      - name: Commit e push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add burndown.png

          git commit -m "Atualiza gráfico de Burndown" || echo "Sem mudanças"

          git push
